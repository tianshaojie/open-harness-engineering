name: Docs Guard

on:
  pull_request:
    paths:
      - "README.md"
      - "ARCHITECTURE.md"
      - "PLANS.md"
      - "AGENTS.md"
      - "backend/AGENTS.md"
      - "frontend/AGENTS.md"
      - "docs/**"
      - "scripts/docs_guard.py"
      - ".github/workflows/docs-guard.yml"
  push:
    branches: ["main"]
    paths:
      - "README.md"
      - "ARCHITECTURE.md"
      - "PLANS.md"
      - "AGENTS.md"
      - "backend/AGENTS.md"
      - "frontend/AGENTS.md"
      - "docs/**"
      - "scripts/docs_guard.py"
      - ".github/workflows/docs-guard.yml"

jobs:
  docs-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run docs guard
        run: python scripts/docs_guard.py
