name: Integration CI

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "infra/**"
      - ".github/workflows/integration-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "frontend/**"
      - "infra/**"
      - ".github/workflows/integration-ci.yml"

jobs:
  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: open_harness_engineering
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d open_harness_engineering"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Alembic upgrade smoke
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/open_harness_engineering
        run: alembic upgrade head

      - name: Start backend for probe checks
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/open_harness_engineering
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > backend-smoke.log 2>&1 &
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:8000/health
          curl -fsS http://127.0.0.1:8000/ready

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-artifacts
          path: |
            backend/backend-smoke.log
            frontend/playwright-report
            frontend/test-results
